<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>中级会计师备考打卡</title>
<style>
:root{--acc:#4f6ef2;--fin:#e8a838;--eco:#3dba8c;--rest:#b0b0b0;--bg:#f4f6fb;--card:#fff;--r:14px;--sh:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:"PingFang SC","Helvetica Neue",Arial,sans-serif;color:#333;max-width:540px;margin:0 auto}

.nav{display:flex;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:100}
.nav-item{flex:1;padding:13px 0;text-align:center;font-size:13px;color:#999;cursor:pointer;border-bottom:3px solid transparent;transition:.2s}
.nav-item.active{color:var(--acc);border-color:var(--acc);font-weight:600}

.page{display:none;padding:16px}.page.active{display:block}

.countdown{background:linear-gradient(135deg,#4f6ef2,#7c3aed);color:#fff;border-radius:var(--r);padding:20px 24px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cd-label{font-size:13px;opacity:.85;margin-bottom:4px}.cd-num{font-size:36px;font-weight:700}
.cd-sub{font-size:12px;opacity:.7;margin-top:2px}.cd-right{text-align:right}
.cd-date{font-size:12px;opacity:.75}.cd-exam{font-size:15px;font-weight:600;margin-top:2px}

.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:14px}
.card-title{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:6px}

.task-list{display:flex;flex-direction:column;gap:10px}
.task-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;background:#f8f9ff;cursor:pointer;transition:.15s}
.task-item:hover{background:#eef0ff}.task-item.done{opacity:.55}
.task-item.done .task-name{text-decoration:line-through}
.task-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dot-acc{background:var(--acc)}.dot-fin{background:var(--fin)}.dot-eco{background:var(--eco)}.dot-rest{background:var(--rest)}
.task-name{flex:1;font-size:14px}.task-tag{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap}
.tag-focus{background:#e8eaff;color:var(--acc)}.tag-scatter{background:#e0e8f5;color:#3a5fad}
.task-check{width:22px;height:22px;border:2px solid #ccc;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.task-item.done .task-check{background:var(--acc);border-color:var(--acc)}
.task-check svg{display:none}.task-item.done .task-check svg{display:block}

.progress-row{display:flex;gap:10px}.progress-col{flex:1;text-align:center}
.ring-wrap{position:relative;width:80px;height:80px;margin:0 auto 6px}
.ring-wrap svg{transform:rotate(-90deg)}.ring-bg{fill:none;stroke:#eee;stroke-width:8}
.ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:16px;font-weight:700}
.subj-name{font-size:12px;color:#666;font-weight:500}
.progress-col:hover{cursor:pointer}

.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav{background:none;border:none;font-size:18px;cursor:pointer;color:#666;padding:4px 8px}
.cal-title{font-size:15px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-head{text-align:center;font-size:11px;color:#999;padding:4px 0}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:12px;cursor:default;transition:.15s}
.cal-cell.other{color:#ccc}.cal-cell.today{border:2px solid var(--acc);font-weight:700;color:var(--acc)}
.cal-cell.punched{background:var(--acc);color:#fff}.cal-cell.rest-day{background:#f0f0f0;color:#bbb}
.cal-cell .mini-dots{display:flex;gap:2px;margin-top:2px}.mini-dot{width:5px;height:5px;border-radius:50%}

.notes-tabs{display:flex;gap:8px;margin-bottom:12px}
.note-tab{padding:6px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer}
.note-tab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.note-form{display:flex;flex-direction:column;gap:10px}
.note-form input,.note-form textarea,.note-form select{border:1px solid #e0e0e0;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;background:#fafafa}
.note-form textarea{resize:vertical;min-height:80px}
.note-form button{padding:10px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.note-list{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.note-card{background:#f8f9ff;border-radius:10px;padding:12px 14px;border-left:4px solid var(--acc)}
.note-card.fin{border-color:var(--fin)}.note-card.eco{border-color:var(--eco)}
.note-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.note-subj{font-size:12px;font-weight:600;color:var(--acc)}
.note-card.fin .note-subj{color:var(--fin)}.note-card.eco .note-subj{color:var(--eco)}
.note-date{font-size:11px;color:#bbb}.note-content{font-size:13px;line-height:1.6}
.note-del{font-size:12px;color:#ccc;cursor:pointer;margin-left:8px}.note-del:hover{color:#f55}
.empty-tip{text-align:center;color:#bbb;font-size:13px;padding:24px 0}

.stat-row{display:flex;gap:10px;margin-bottom:10px}
.stat-box{flex:1;background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:700;color:var(--acc)}.stat-lbl{font-size:12px;color:#999;margin-top:4px}

.phase-bar{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;margin-bottom:12px;text-align:center}
.phase-1{background:#e8f5e9;color:#2e7d32}.phase-2{background:#fff3e0;color:#e65100}.phase-3{background:#e3f2fd;color:#1565c0}.phase-4{background:#fce4ec;color:#c62828}

.tip-box{background:#fffbe6;border:1px solid #ffe58f;border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.6;color:#8c6900;margin-bottom:14px}
.tip-box strong{color:#d48806}

@media(max-width:380px){.cd-num{font-size:28px}.task-name{font-size:13px}}
</style>
</head>
<body>

<!-- 导航 -->
<div class="nav">
  <div class="nav-item active" onclick="switchPage(0)">今日打卡</div>
  <div class="nav-item" onclick="switchPage(1)">日历</div>
  <div class="nav-item" onclick="switchPage(2)">笔记</div>
  <div class="nav-item" onclick="switchPage(3)">统计</div>
</div>

<!-- Page 0: 今日打卡 -->
<div class="page active" id="page0">
  <!-- 倒计时 -->
  <div class="countdown" id="countdown"></div>

  <!-- 当前阶段 -->
  <div id="phaseBar"></div>

  <!-- 今日任务 -->
  <div class="card">
    <div class="card-title">📖 今日任务</div>
    <div class="task-list" id="taskList"></div>
  </div>

  <!-- 进度 -->
  <div class="card">
    <div class="card-title">📊 备考进度（点击修改）</div>
    <div class="progress-row" id="progressRow"></div>
  </div>

  <!-- 小贴士 -->
  <div class="tip-box" id="tipBox"></div>
</div>

<!-- Page 1: 日历 -->
<div class="page" id="page1">
  <div class="card">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">◀</button>
      <div class="cal-title" id="calTitle"></div>
      <button class="cal-nav" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<!-- Page 2: 笔记 -->
<div class="page" id="page2">
  <div class="card">
    <div class="notes-tabs">
      <div class="note-tab active" onclick="switchNoteTab(0)">📝 复习笔记</div>
      <div class="note-tab" onclick="switchNoteTab(1)">❌ 错题记录</div>
    </div>
    <div class="note-form" id="noteForm">
      <input id="noteTitle" placeholder="标题（可选）" />
      <select id="noteSubject"><option value="acc">会计实务</option><option value="fin">财务管理</option><option value="eco">经济法</option></select>
      <textarea id="noteContent" placeholder="内容..."></textarea>
      <button onclick="addNote()">添加</button>
    </div>
    <div class="note-list" id="noteList"></div>
  </div>
</div>

<!-- Page 3: 统计 -->
<div class="page" id="page3">
  <div class="stat-row">
    <div class="stat-box"><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">累计打卡天数</div></div>
    <div class="stat-box"><div class="stat-val" id="statStreak">0</div><div class="stat-lbl">连续打卡天数</div></div>
  </div>
  <div class="stat-row">
    <div class="stat-box"><div class="stat-val" id="statMonth">0</div><div class="stat-lbl">本月打卡天数</div></div>
    <div class="stat-box"><div class="stat-val" id="statRate">0%</div><div class="stat-lbl">打卡率</div></div>
  </div>
  <div class="card" style="margin-top:10px">
    <div class="card-title">📅 重要日期提醒</div>
    <div id="reminders"></div>
  </div>
  <div style="text-align:center;padding:12px 0">
    <div style="font-size:12px;color:#bbb">数据保存在浏览器本地，刷新不丢失</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// 常量
// ══════════════════════════════════════════════════════════
const EXAM_DATE = new Date(2026, 8, 5);
const REG_START = new Date(2026, 5, 12);
const REG_END = new Date(2026, 6, 2);
const START_DATE = new Date(2026, 4, 7);
const WEEK_CN = ['日','一','二','三','四','五','六'];

// 学习计划数据
const SUBJECTS = {
  acc: { name: '会计实务', total: 21, color: '#4f6ef2', done: 0 },
  fin: { name: '财务管理', total: 10, color: '#e8a838', done: 6 },
  eco: { name: '经济法', total: 12, color: '#3dba8c', done: 0 },
};

// ── 状态 ──
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();
let currentNoteTab = 0;

// ══════════════════════════════════════════════════════════
// 学习计划任务生成（每天集中2h + 零散30-60min）
// ══════════════════════════════════════════════════════════
function getPhase(d) {
  const m = d.getMonth(), dd = d.getDate();
  if ((m===4&&dd>=7)||(m===4)) return {phase:1, name:'第一阶段：夯实基础', cls:'phase-1'};
  if (m===5) return {phase:2, name:'第二阶段：全面推进', cls:'phase-2'};
  if (m===6||(m===7&&dd<=10)) return {phase:3, name:'第三阶段：强化刷题', cls:'phase-3'};
  if ((m===7&&dd>=11)||(m===8&&dd<=4)) return {phase:4, name:'第四阶段：冲刺模考', cls:'phase-4'};
  return {phase:5, name:'考试', cls:'phase-4'};
}

function weekOf(d, dStart) {
  return Math.floor((d - dStart) / 604800000) + 1;
}

function getTasks(d) {
  const wd = d.getDay();
  const m = d.getMonth(), dd = d.getDate();
  const tasks = [];

  if (wd === 0) {
    return [{name:'🛌 休息日', subj:'rest', focus:false}];
  }

  const w = weekOf(d, START_DATE);

  // 第一阶段 5/7-5/31
  if (m===4 && dd>=7) {
    const accTopics = {1:'第1-3章 存货/固定资产/无形资产',2:'第4-6章 投资性房地产/长投',3:'第7-9章 资产减值/金融资产/薪酬',4:'第10-12章 收入/所得税/外币'};
    const finTopics = {1:'第6章复习+第7章 投资管理',2:'第8章 成本管理',3:'第9章 收入与分配',4:'第10章 财务分析与评价'};
    if (wd===1||wd===3||wd===5) {
      tasks.push({name:'📗 会计 '+(accTopics[Math.min(w,4)]||'重点梳理+刷题'), subj:'acc', focus:true});
      tasks.push({name:'经济法刷10题/法条速记', subj:'eco', focus:false});
    } else if (wd===2||wd===4) {
      tasks.push({name:'📙 财管 '+(finTopics[Math.min(w,4)]||'推进+习题'), subj:'fin', focus:true});
      tasks.push({name:'经济法刷10题/法条速记', subj:'eco', focus:false});
    } else {
      tasks.push({name:'📗 会计 综合练习+错题巩固', subj:'acc', focus:true});
      tasks.push({name:'经济法刷题+错题回顾', subj:'eco', focus:false});
    }
    return tasks;
  }

  // 第二阶段 6/1-6/30
  if (m===5) {
    const finTopics = {1:'第7-8章 投资管理+成本管理',2:'第9-10章 收入分配+财务分析',3:'综合练习+计算专项',4:'历年真题'};
    const accTopics = {1:'第13-15章 合并报表等难点',2:'第16-18章 会计政策/日后事项',3:'第19-21章 政府会计等',4:'综合练习+查漏补缺'};
    if (wd===1||wd===4) {
      tasks.push({name:'📙 财管 '+(finTopics[Math.min(w,4)]||'专项训练'), subj:'fin', focus:true});
      tasks.push({name:'经济法公司法刷题', subj:'eco', focus:false});
    } else if (wd===2||wd===5) {
      tasks.push({name:'📗 会计 '+(accTopics[Math.min(w,4)]||'刷题补缺'), subj:'acc', focus:true});
      tasks.push({name:'经济法合同法刷题', subj:'eco', focus:false});
    } else if (wd===3) {
      tasks.push({name:'📙 财管 公式默写+计算专项', subj:'fin', focus:true});
      tasks.push({name:'经济法证券法/税法刷题', subj:'eco', focus:false});
    } else {
      tasks.push({name:'📗 会计 错题复盘+重点回顾', subj:'acc', focus:true});
      tasks.push({name:'经济法综合刷题+错题', subj:'eco', focus:false});
    }
    return tasks;
  }

  // 第三阶段 7/1-8/10
  if (m===6||(m===7&&dd<=10)) {
    if (wd===1||wd===4) {
      tasks.push({name:'📗 会计 历年真题+错题精练', subj:'acc', focus:true});
      tasks.push({name:'经济法真题+法条速记', subj:'eco', focus:false});
    } else if (wd===2||wd===5) {
      tasks.push({name:'📙 财管 历年真题+计算专项', subj:'fin', focus:true});
      tasks.push({name:'财管公式默写/经济法刷题', subj:'fin', focus:false});
    } else if (wd===3) {
      tasks.push({name:'会计/财管 交叉复习薄弱点', subj:'acc', focus:true});
      tasks.push({name:'经济法真题+错题回顾', subj:'eco', focus:false});
    } else {
      tasks.push({name:'经济法真题套卷（1.5h）+会计回顾（0.5h）', subj:'eco', focus:true});
      tasks.push({name:'经济法综合模拟+法条梳理', subj:'eco', focus:false});
    }
    return tasks;
  }

  // 第四阶段 8/11-9/4
  if ((m===7&&dd>=11)||(m===8&&dd<=4)) {
    const subjects = ['会计实务','财务管理','经济法'];
    const idx = Math.floor((d - new Date(2026,7,11)) / 86400000) % 3;
    if (wd===1||wd===4) {
      tasks.push({name:'📋 '+subjects[idx]+' 全真模拟卷（限时2h）', subj:'acc', focus:true});
      tasks.push({name:'错题回顾+公式/法条速记', subj:'eco', focus:false});
    } else if (wd===2||wd===5) {
      tasks.push({name:'📝 错题集中复盘 三科轮流', subj:'acc', focus:true});
      tasks.push({name:'经济法高频法条速记', subj:'eco', focus:false});
    } else if (wd===3) {
      tasks.push({name:'重点公式/法条/分录速记', subj:'acc', focus:true});
      tasks.push({name:'经济法必背法条', subj:'eco', focus:false});
    } else {
      tasks.push({name:'📋 模拟押题卷', subj:'acc', focus:true});
      tasks.push({name:'考前速记手册浏览', subj:'eco', focus:false});
    }
    return tasks;
  }

  return [{name:'自由复习', subj:'acc', focus:true}];
}

// ══════════════════════════════════════════════════════════
// 数据存取（纯 localStorage）
// ══════════════════════════════════════════════════════════
function getData() {
  return JSON.parse(localStorage.getItem('study_data') || '{"checkins":{},"notes":[],"stats":{}}');
}

function saveData(data) {
  localStorage.setItem('study_data', JSON.stringify(data));
}

// ══════════════════════════════════════════════════════════
// 初始化
// ══════════════════════════════════════════════════════════
function init() {
  renderAll();
}

function renderAll() {
  renderCountdown();
  renderPhase();
  renderTasks();
  renderProgress();
  renderCalendar();
  renderNotes();
  renderStats();
  renderTips();
  renderReminders();
}

// ══════════════════════════════════════════════════════════
// 渲染函数
// ══════════════════════════════════════════════════════════
function renderCountdown() {
  const now = new Date();
  const days = Math.max(0, Math.ceil((EXAM_DATE - now) / 86400000));
  const regDays = REG_START - now > 0 ? Math.ceil((REG_START - now)/86400000) : 0;
  const regEndDays = REG_END - now > 0 ? Math.ceil((REG_END - now)/86400000) : 0;
  let sub = regDays > 0 ? '距报名还有'+regDays+'天' : regEndDays > 0 ? '报名中！距截止'+regEndDays+'天' : '';
  document.getElementById('countdown').innerHTML =
    '<div><div class="cd-label">距离考试</div><div class="cd-num">'+days+'</div><div class="cd-sub">天</div></div>' +
    '<div class="cd-right"><div class="cd-date">2026.9.5-6</div><div class="cd-exam">中级会计师</div>' +
    (sub ? '<div style="font-size:12px;opacity:.8;margin-top:4px">'+sub+'</div>' : '') + '</div>';
}

function renderPhase() {
  const now = new Date();
  const p = getPhase(now);
  document.getElementById('phaseBar').innerHTML = '<div class="phase-bar '+p.cls+'">'+p.name+'</div>';
}

function renderTasks() {
  const today = new Date().toISOString().slice(0,10);
  const data = getData();
  const checked = data.checkins[today] || [];
  const tasks = getTasks(new Date());
  const list = document.getElementById('taskList');
  list.innerHTML = tasks.map((t, i) => {
    const dotCls = t.subj==='acc'?'dot-acc':t.subj==='fin'?'dot-fin':t.subj==='eco'?'dot-eco':'dot-rest';
    const done = checked.includes(i) ? 'done' : '';
    const tag = t.focus ? '<span class="task-tag tag-focus">集中学习</span>' : '<span class="task-tag tag-scatter">零散时间</span>';
    return '<div class="task-item '+done+'" onclick="toggleTask('+i+')">' +
      '<div class="task-dot '+dotCls+'"></div>' +
      '<div style="flex:1"><div class="task-name">'+t.name+'</div></div>' +
      tag +
      '<div class="task-check"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>';
  }).join('');
}

function toggleTask(idx) {
  const today = new Date().toISOString().slice(0,10);
  const data = getData();
  if (!data.checkins[today]) data.checkins[today] = [];
  const ci = data.checkins[today].indexOf(idx);
  if (ci >= 0) data.checkins[today].splice(ci, 1);
  else data.checkins[today].push(idx);
  saveData(data);
  renderTasks();
  renderCalendar();
  renderStats();
}

function renderProgress() {
  const data = getData();
  const progress = data.stats && data.stats.progress ? data.stats.progress : { acc:0, fin:6, eco:0 };
  const row = document.getElementById('progressRow');
  const circumference = 2 * Math.PI * 34;
  row.innerHTML = ['acc','fin','eco'].map(key => {
    const s = SUBJECTS[key];
    const done = progress[key] || 0;
    const pct = Math.min(100, Math.round(done/s.total*100));
    const offset = circumference * (1 - pct/100);
    return '<div class="progress-col" onclick="editProgress(\''+key+'\')">' +
      '<div class="ring-wrap"><svg width="80" height="80" viewBox="0 0 80 80">' +
      '<circle class="ring-bg" cx="40" cy="40" r="34"/>' +
      '<circle class="ring-fg" cx="40" cy="40" r="34" stroke="'+s.color+'" stroke-dasharray="'+circumference+'" stroke-dashoffset="'+offset+'"/>' +
      '</svg><div class="ring-text"><div class="ring-pct" style="color:'+s.color+'">'+done+'/'+s.total+'</div></div></div>' +
      '<div class="subj-name">'+s.name+'</div></div>';
  }).join('');
}

function editProgress(key) {
  const data = getData();
  const progress = data.stats && data.stats.progress ? data.stats.progress : { acc:0, fin:6, eco:0 };
  const val = prompt(SUBJECTS[key].name + ' 已完成章节数：', progress[key] || 0);
  if (val !== null) {
    const n = parseInt(val);
    if (!isNaN(n) && n >= 0 && n <= SUBJECTS[key].total) {
      if (!data.stats) data.stats = {};
      if (!data.stats.progress) data.stats.progress = { acc:0, fin:6, eco:0 };
      data.stats.progress[key] = n;
      saveData(data);
      renderProgress();
    }
  }
}

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  const title = document.getElementById('calTitle');
  title.textContent = calYear + '年' + (calMonth+1) + '月';

  const data = getData();
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date().toISOString().slice(0,10);

  let html = WEEK_CN.map(d => '<div class="cal-day-head">'+d+'</div>').join('');
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-cell other"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dt = new Date(calYear, calMonth, d);
    const wd = dt.getDay();
    const isToday = dateStr === today;
    const checked = data.checkins[dateStr];
    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    if (wd === 0) cls += ' rest-day';
    else if (checked && checked.length > 0) cls += ' punched';

    const dots = checked && checked.length > 0 ? '<div class="mini-dots"><div class="mini-dot" style="background:var(--acc)"></div></div>' : '';
    html += '<div class="'+cls+'">'+d+dots+'</div>';
  }
  grid.innerHTML = html;
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function renderNotes() {
  const data = getData();
  const notes = (data.notes || []).filter(n => {
    if (currentNoteTab === 0) return n.type !== 'error';
    return n.type === 'error';
  });
  const list = document.getElementById('noteList');
  document.getElementById('noteSubject').style.display = currentNoteTab === 1 ? 'none' : '';

  if (notes.length === 0) {
    list.innerHTML = '<div class="empty-tip">'+(currentNoteTab===1?'暂无错题记录':'暂无复习笔记')+'</div>';
    return;
  }

  list.innerHTML = notes.slice(0, 50).map(n => {
    const cls = n.subject==='fin'?'fin':n.subject==='eco'?'eco':'';
    return '<div class="note-card '+cls+'"><div class="note-head"><div>' +
      '<span class="note-subj">'+SUBJECTS[n.subject].name+'</span>' +
      (n.title ? ' · '+n.title : '') + '</div>' +
      '<div><span class="note-date">'+n.date+'</span><span class="note-del" onclick="delNote(\''+n.id+'\')">✕</span></div></div>' +
      '<div class="note-content">'+(n.content||'').replace(/\n/g,'<br>')+'</div></div>';
  }).join('');
}

function switchNoteTab(idx) {
  currentNoteTab = idx;
  document.querySelectorAll('.note-tab').forEach((el,i) => {
    el.classList.toggle('active', i===idx);
  });
  renderNotes();
}

function addNote() {
  const title = document.getElementById('noteTitle').value.trim();
  const subject = document.getElementById('noteSubject').value;
  const content = document.getElementById('noteContent').value.trim();
  if (!content) return;
  const data = getData();
  if (!data.notes) data.notes = [];
  data.notes.unshift({
    id: Date.now().toString(),
    type: currentNoteTab === 1 ? 'error' : 'note',
    title, subject, content,
    date: new Date().toLocaleDateString('zh-CN')
  });
  if (data.notes.length > 200) data.notes = data.notes.slice(0, 200);
  saveData(data);
  document.getElementById('noteTitle').value = '';
  document.getElementById('noteContent').value = '';
  renderNotes();
}

function delNote(id) {
  const data = getData();
  if (data.notes) {
    data.notes = data.notes.filter(n => n.id !== id);
    saveData(data);
    renderNotes();
  }
}

function renderStats() {
  const data = getData();
  const checkins = data.checkins || {};
  const dates = Object.keys(checkins).filter(k => checkins[k] && checkins[k].length > 0).sort();
  const total = dates.length;

  // 连续打卡
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    if (d.getDay() === 0) continue;
    if (checkins[ds] && checkins[ds].length > 0) streak++;
    else if (i > 0) break;
  }

  // 本月
  const monthKey = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0');
  const monthCount = dates.filter(d => d.startsWith(monthKey)).length;
  const now = today.getDate();
  const studyDays = Array.from({length:now}, (_, i) => new Date(today.getFullYear(), today.getMonth(), i+1))
    .filter(d => d.getDay() !== 0 && d <= today).length;
  const rate = studyDays > 0 ? Math.round(monthCount / studyDays * 100) : 0;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statStreak').textContent = streak;
  document.getElementById('statMonth').textContent = monthCount;
  document.getElementById('statRate').textContent = rate + '%';
}

function renderTips() {
  const tips = [
    '💡 <strong>集中2小时</strong>用来听课/刷题，<strong>零散时间</strong>做经济法记忆和错题回顾',
    '💡 财管去年59分说明基础在，<strong>重点攻克计算题</strong>，做公式手写本',
    '💡 经济法有基础直接刷题，多选题陷阱多，法条提炼为<strong>关键词记忆卡</strong>',
    '💡 每天开始前花10分钟<strong>回顾昨日错题</strong>，睡前15分钟<strong>速记法条</strong>',
    '💡 8月起每周至少做1套<strong>全真模拟卷</strong>，控制答题时间',
  ];
  const today = new Date();
  document.getElementById('tipBox').innerHTML = tips[today.getDate() % tips.length];
}

function renderReminders() {
  const now = new Date();
  const items = [];
  if (REG_START - now > 0) items.push('📅 报名开始: 6月12日（还有'+Math.ceil((REG_START-now)/86400000)+'天）');
  else if (REG_END - now > 0) items.push('🔴 报名中！截止7月2日');
  items.push('🎯 考试: 9月5-6日（还有'+Math.max(0,Math.ceil((EXAM_DATE-now)/86400000))+'天）');
  document.getElementById('reminders').innerHTML = items.map(t => '<div style="padding:8px 0;font-size:14px;border-bottom:1px solid #f0f0f0">'+t+'</div>').join('');
}

  document.querySelectorAll('.page').forEach((p,i) => p.classList.toggle('active', i===idx));
  document.querySelectorAll('.nav-item').forEach((n,i) => n.classList.toggle('active', i===idx));
